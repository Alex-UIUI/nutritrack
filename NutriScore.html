  <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBpSrQR3xuM_hF5QWBOmYDjwNW435yEXfI",
            authDomain: "nutri-2bdd6.firebaseapp.com",
            projectId: "nutri-2bdd6",
            storageBucket: "nutri-2bdd6.firebasestorage.app",
            messagingSenderId: "333548856855",
            appId: "1:333548856855:web:1f78c23210889058e6de52"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        let chartsRendered = false;

        // Función auxiliar para buscar elementos sin que dé error
        const getEl = (id) => document.getElementById(id);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                showDashboard(user.email);
            } else {
                showLogin();
            }
        });

        // Evento Login
        const loginForm = getEl('login-form');
        if (loginForm) {
            loginForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const email = getEl('email').value;
                const pass = getEl('password').value;
                const btn = getEl('btn-login-email');
                const errorDiv = getEl('login-error');

                if (btn) { btn.disabled = true; btn.innerText = "Verificando..."; }

                signInWithEmailAndPassword(auth, email, pass)
                    .catch((error) => {
                        if (errorDiv) {
                            errorDiv.innerText = "Correo o contraseña incorrectos.";
                            errorDiv.classList.remove('hidden');
                        }
                        if (btn) { btn.disabled = false; btn.innerText = "Entrar al Dashboard"; }
                    });
            });
        }

        // Logout
        const logoutBtn = getEl('btn-logout');
        if (logoutBtn) {
            logoutBtn.addEventListener('click', () => { signOut(auth); });
        }

        async function showDashboard(email) {
            const loginScreen = getEl('login-screen');
            const appScreen = getEl('app-screen');
            const userEmail = getEl('user-email');

            if (loginScreen) loginScreen.classList.add('hidden');
            if (appScreen) appScreen.classList.remove('hidden');
            if (userEmail) userEmail.innerText = email;
            
            if (!chartsRendered) {
                try {
                    const res = await fetch('/api/datos');
                    const result = await res.json();
                    if(result.status === "success") {
                        window.updateGlobalData(result.data);
                        window.initCharts();
                        window.changeView('daily');
                        window.renderTimeline();
                    }
                } catch(e) { console.log("Esperando conexión con servidor Python..."); }
                chartsRendered = true;
            }
        }

        function showLogin() {
            const loginScreen = getEl('login-screen');
            const appScreen = getEl('app-screen');
            const errorDiv = getEl('login-error');
            
            if (loginScreen) loginScreen.classList.remove('hidden');
            if (appScreen) appScreen.classList.add('hidden');
            if (errorDiv) errorDiv.classList.add('hidden');
            chartsRendered = false;
        }
    </script>

    <!-- ========================================== -->
    <!-- LÓGICA FRONTEND JS (GRÁFICOS Y DATOS) -->
    <!-- ========================================== -->
    <script>
        // Variables Globales vacías que se llenarán desde Python
        let catsLabels = [], isoDates = [];
        let kcals = [], carbs = [], proTs = [], fats = [], fasts = [], rawMicros = {}, mealsData = {};
        
        const microNames = { "mineral.magnesium": "Magnesio", "mineral.iron": "Hierro", "mineral.zinc": "Zinc", "mineral.calcium": "Calcio", "mineral.potassium": "Potasio", "vitamin.c": "Vitamina C", "vitamin.a": "Vitamina A" };
        const viewTitles = { 'daily': 'VISTA DIARIA', 'weekly': 'VISTA SEMANAL', 'monthly': 'VISTA MENSUAL', 'yearly': 'VISTA ANUAL' };

        let currentView = 'daily', activeMicroKey = 'mineral.magnesium';
        let periods = [], currentPeriodIndex = 0;
        let chartKcalInst, chartMacrosInst, chartFastInst, chartMicroInst;

        // Botón Desplegar Historial (Evento seguro)
        document.getElementById('toggleBtnHistory').addEventListener('click', () => {
            const sec = document.getElementById('history-section');
            if(sec.classList.contains('hidden')) { 
                sec.classList.remove('hidden'); 
                setTimeout(() => sec.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100); 
            } else { sec.classList.add('hidden'); }
        });

        // Llamada a Python para Sincronizar
        window.sincronizarAPI = async function() {
  const btn = document.getElementById('btn-sync');
  const icon = document.getElementById('icon-sync');
  const text = document.getElementById('text-sync');

  btn.disabled = true;
  icon.classList.add('animate-spin');
  text.innerText = "Descargando...";

  try {
    const user = auth.currentUser;
    if (!user) throw new Error("Usuario no autenticado");

    // ✅ AQUÍ está la clave
    const token = await user.getIdToken();

    const response = await fetch('/api/importar', {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${token}`
      }
    });

    const result = await response.json();

    if (result.status === "success") {
      updateGlobalData(result.data);
      if (!chartKcalInst) initCharts();
      changeView(currentView);
      text.innerText = "¡Actualizado!";
    } else {
      alert("Error: " + result.message);
      text.innerText = "Sincronizar";
    }
  } catch (error) {
    alert(error.message || "Error al sincronizar");
    text.innerText = "Sincronizar";
  }

  btn.disabled = false;
  icon.classList.remove('animate-spin');

  setTimeout(() => {
    if (text.innerText === "¡Actualizado!") {
      text.innerText = "Sincronizar";
    }
  }, 3000);
};
        // Actualizar variables y renderizar HTML superior
        window.updateGlobalData = function(data) {
            catsLabels = data.fechas; isoDates = data.isoDates;
            kcals = data.kcals; carbs = data.carbs; proTs = data.prots; fats = data.fats; fasts = data.fasts;
            rawMicros = data.rawMicros; mealsData = data.mealsData;

            if(kcals.length > 0) {
                const avg = (arr) => Math.round(arr.reduce((a,b)=>a+b,0)/arr.length);
                const aK=avg(kcals), aC=avg(carbs), aP=avg(proTs), aF=avg(fats);
                
                document.getElementById('kpi-kcal').innerText = aK;
                document.getElementById('kpi-carb').innerText = aC + "g"; document.getElementById('pct-carb').innerText = Math.round((aC/80.5)*100) + "%"; document.getElementById('bar-carb').style.width = Math.min((aC/80.5)*100, 100) + "%";
                document.getElementById('kpi-prot').innerText = aP + "g"; document.getElementById('pct-prot').innerText = Math.round((aP/107.3)*100) + "%"; document.getElementById('bar-prot').style.width = Math.min((aP/107.3)*100, 100) + "%";
                document.getElementById('kpi-fat').innerText = aF + "g"; document.getElementById('pct-fat').innerText = Math.round((aF/155)*100) + "%"; document.getElementById('bar-fat').style.width = Math.min((aF/155)*100, 100) + "%";
                
                renderRecentMeals();
                renderTimeline();
            }
        }

        window.changeView = function(view) {
            currentView = view;
            ['daily', 'weekly', 'monthly', 'yearly'].forEach(v => {
                const btn = document.getElementById('btn-' + v);
                if(v === view) { btn.classList.add('bg-slate-800', 'text-white'); btn.classList.remove('text-gray-500', 'hover:text-gray-900'); } 
                else { btn.classList.remove('bg-slate-800', 'text-white'); btn.classList.add('text-gray-500', 'hover:text-gray-900'); }
            });
            if (view === 'daily') { document.getElementById('pagination-ctrl').classList.add('hidden'); } 
            else { document.getElementById('pagination-ctrl').classList.remove('hidden'); generatePeriods(view); }
            renderView();
        }
        
        window.nextPeriod = function() { if(currentPeriodIndex < periods.length - 1) { currentPeriodIndex++; renderView(); } }
        window.prevPeriod = function() { if(currentPeriodIndex > 0) { currentPeriodIndex--; renderView(); } }

        function generatePeriods(view) {
            let map = new Map();
            isoDates.forEach((dStr, idx) => {
                let d = new Date(dStr + "T00:00:00Z"); let periodKey, slotIndex;
                if(view === 'weekly') {
                    let jsDay = d.getUTCDay() === 0 ? 6 : d.getUTCDay() - 1; 
                    let mon = new Date(d); mon.setUTCDate(d.getUTCDate() - jsDay);
                    let sun = new Date(mon); sun.setUTCDate(sun.getUTCDate() + 6);
                    periodKey = "Semana " + mon.getUTCDate() + "/" + (mon.getUTCMonth()+1);
                    slotIndex = jsDay; 
                } else if (view === 'monthly') {
                    periodKey = d.toLocaleString('es-ES', {month:'long', year:'numeric', timeZone:'UTC'}).toUpperCase();
                    let firstDay = new Date(Date.UTC(d.getUTCFullYear(), d.getUTCMonth(), 1));
                    let offset = firstDay.getUTCDay() === 0 ? 6 : firstDay.getUTCDay() - 1;
                    slotIndex = Math.floor((d.getUTCDate() + offset - 1) / 7);
                } else {
                    periodKey = "AÑO " + d.getUTCFullYear();
                    slotIndex = d.getUTCMonth();
                }
                if(!map.has(periodKey)) map.set(periodKey, { label: periodKey, slots: Array.from({length: view==='weekly'?7:view==='monthly'?6:12}, () => ({ count:0, k:0, c:0, p:0, f:0, fast:0, mic:0 })) });
                let slot = map.get(periodKey).slots[slotIndex];
                slot.count++; slot.k += kcals[idx]; slot.c += carbs[idx]; slot.p += proTs[idx]; slot.f += fats[idx]; slot.fast += fasts[idx]; 
                let microDataRaw = rawMicros[activeMicroKey] || {};
                slot.mic += (microDataRaw[dStr] || 0) * 1000;
            });
            periods = Array.from(map.values()); currentPeriodIndex = periods.length - 1;
        }

        function getGroupedData() {
            let catsX=[], sK=[], sC=[], sP=[], sF=[], sFast=[], sMic=[];
            let sumK=0, sumC=0, sumP=0, sumF=0, sumFast=0, sumMic=0, validDays=0;
            let displayTitle = viewTitles[currentView];

            if (currentView === 'daily') {
                isoDates.forEach((dStr, i) => {
                    catsX.push(catsLabels[i]);
                    sK.push(Math.round(kcals[i])); sC.push(Math.round(carbs[i])); sP.push(Math.round(proTs[i])); sF.push(Math.round(fats[i])); sFast.push(fasts[i]);
                    let microDataRaw = rawMicros[activeMicroKey] || {};
                    let m = (microDataRaw[dStr] || 0) * 1000; sMic.push(m);
                    sumK+=kcals[i]; sumC+=carbs[i]; sumP+=proTs[i]; sumF+=fats[i]; sumFast+=fasts[i]; sumMic+=m; validDays++;
                });
            } else {
                if(periods.length === 0) return null;
                const period = periods[currentPeriodIndex]; displayTitle = period.label;
                catsX = currentView==='weekly'?['Lun','Mar','Mié','Jue','Vie','Sáb','Dom']:currentView==='monthly'?['Sem 1','Sem 2','Sem 3','Sem 4','Sem 5','Sem 6']:['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
                period.slots.forEach((s, i) => {
                    if(s.count>0 && i<catsX.length) {
                        validDays++; 
                        // Math.round ASEGURA QUE NO HAYA DECIMALES LARGOS EN EL GRÁFICO
                        sK.push(Math.round(s.k/s.count)); sC.push(Math.round(s.c/s.count)); sP.push(Math.round(s.p/s.count)); sF.push(Math.round(s.f/s.count)); 
                        sFast.push(Number((s.fast/s.count).toFixed(1))); sMic.push(s.mic/s.count);
                        sumK+=s.k/s.count; sumC+=s.c/s.count; sumP+=s.p/s.count; sumF+=s.f/s.count; sumFast+=s.fast/s.count; sumMic+=s.mic/s.count;
                    } else if(i<catsX.length) { sK.push(null); sC.push(0); sP.push(0); sF.push(0); sFast.push(0); sMic.push(null); }
                });
                document.getElementById('periodLabel').innerText = period.label;
                document.getElementById('btn-prev').disabled = currentPeriodIndex === 0;
                document.getElementById('btn-next').disabled = currentPeriodIndex === periods.length - 1;
            }
            let avg = (v) => validDays > 0 ? (v/validDays) : 0;
            return { title: displayTitle, cats: catsX, gK:sK, gC:sC, gP:sP, gF:sF, gFast:sFast, gMic:sMic, aK:avg(sumK), aC:avg(sumC), aP:avg(sumP), aF:avg(sumF), aFast:avg(sumFast), aMic:avg(sumMic) };
        }

        window.initCharts = function() {
            // Zoom deshabilitado en todos
            const baseOpt = { chart: { fontFamily: 'Inter', toolbar: {show: false}, animations:{enabled:true}, zoom:{enabled:false} }, dataLabels: {enabled: false} };
            
            chartKcalInst = new ApexCharts(document.querySelector("#chartCalories"), { ...baseOpt, chart: {type: 'bar', height: 280, toolbar:{show:false}, zoom:{enabled:false}}, colors: ['#00d061'], plotOptions: {bar: {borderRadius: 4, columnWidth: '50%'}}, series: [] }); chartKcalInst.render();
            chartMacrosInst = new ApexCharts(document.querySelector("#chartMacros"), { ...baseOpt, chart: {type: 'bar', height: 350, toolbar:{show:false}, zoom:{enabled:false}}, colors: ['#ff9800', '#4384f5', '#ef4444'], plotOptions: {bar: {horizontal: false, columnWidth: '60%', borderRadius: 2}}, series: [], legend: {position: 'top', horizontalAlign: 'left', fontWeight: 700} }); chartMacrosInst.render();
            chartFastInst = new ApexCharts(document.querySelector("#chartFasting"), { ...baseOpt, chart: {type: 'bar', height: 250, toolbar:{show:false}, zoom:{enabled:false}}, colors: [({value})=>value>=23?'#ff9800':'#00d061'], plotOptions: {bar: {borderRadius: 4, dataLabels: {position: 'top'}, columnWidth: '40%'}}, dataLabels: {enabled: true, formatter: (val)=>val>=23?"OMAD":val>0?Math.round(val)+"h":"", offsetY: -20, style: {fontSize: '10px', fontWeight: 800, colors: ["#475569"]}}, series: [] }); chartFastInst.render();
            chartMicroInst = new ApexCharts(document.querySelector("#chartMicros"), { ...baseOpt, chart: {type: 'area', height: 300, toolbar:{show:false}, zoom:{enabled:false}}, colors: ['#8b5cf6'], fill: {type: 'gradient', gradient: {shadeIntensity: 1, opacityFrom: 0.3, opacityTo: 0.05, stops: [0, 100]}}, stroke: {curve: 'smooth', width: 3}, series: [] }); chartMicroInst.render();

            const sel = document.getElementById('microSelect');
            Object.keys(microNames).forEach(k => { const o=document.createElement('option'); o.value=k; o.text=microNames[k]; if(k===activeMicroKey) o.selected=true; sel.appendChild(o); });
            sel.addEventListener('change', (e) => { activeMicroKey = e.target.value; renderView(); });
        }

        function renderView() {
            const d = getGroupedData();
            if(!d) return; 

            const subtitleColor = currentView === 'daily' ? 'text-brand' : 'text-brand-blue';

            document.getElementById('headerCalories').innerHTML = `<div><h2 class="text-xl font-extrabold text-slate-900 mb-1">Evolución de Calorías</h2><p class="text-xs font-bold ${subtitleColor} uppercase tracking-widest mt-1">${d.title}</p></div><div class="mt-4 lg:mt-0 lg:text-right flex items-center lg:block space-x-3 lg:space-x-0"><p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-0.5">Media del Periodo</p><div class="flex items-baseline space-x-1 lg:justify-end"><h3 class="text-3xl font-extrabold text-slate-900 tracking-tight">${d.aK.toFixed(0)}</h3><span class="text-sm font-bold text-slate-400">KCAL</span></div></div>`;
            document.getElementById('headerMacros').innerHTML = `<div><h2 class="text-xl font-extrabold text-slate-900 mb-1">Distribución de Macronutrientes</h2><p class="text-xs font-bold ${subtitleColor} uppercase tracking-widest mt-1">${d.title}</p></div><div class="flex space-x-4 sm:space-x-6 mt-4 lg:mt-0 lg:text-right overflow-x-auto no-scrollbar pb-1"><div class="shrink-0"><p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-0.5">Media Grasas</p><h3 class="text-2xl font-extrabold text-brand-orange">${d.aF.toFixed(0)}<span class="text-xs text-slate-400 ml-0.5">g</span></h3></div><div class="shrink-0"><p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-0.5">Media Prot</p><h3 class="text-2xl font-extrabold text-brand-blue">${d.aP.toFixed(0)}<span class="text-xs text-slate-400 ml-0.5">g</span></h3></div><div class="shrink-0"><p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-0.5">Media Carbs</p><h3 class="text-2xl font-extrabold text-brand-red">${d.aC.toFixed(0)}<span class="text-xs text-slate-400 ml-0.5">g</span></h3></div></div>`;
            document.getElementById('headerFasting').innerHTML = `<div><h2 class="text-xl font-extrabold text-slate-900 mb-1">Patrón de Ayuno</h2><p class="text-xs font-bold ${subtitleColor} uppercase tracking-widest mt-1">${d.title}</p></div><div class="mt-4 lg:mt-0 lg:text-right flex items-center lg:block space-x-3 lg:space-x-0"><p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-0.5">Media de Ayuno</p><div class="flex items-baseline space-x-1 lg:justify-end"><h3 class="text-3xl font-extrabold text-slate-900 tracking-tight">${d.aFast.toFixed(1)}</h3><span class="text-sm font-bold text-slate-400">H</span></div></div>`;
            document.getElementById('headerMicrosInfo').innerHTML = `<h2 class="text-xl font-extrabold text-slate-900 mb-1">Evolución de <span class="text-brand-blue">${microNames[activeMicroKey]}</span></h2><p class="text-xs font-bold ${subtitleColor} uppercase tracking-widest mt-1">${d.title}</p>`;
            document.getElementById('headerMicrosAvg').innerHTML = `<p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-0.5">Media del Periodo</p><div class="flex items-baseline space-x-1 lg:justify-end"><h3 class="text-2xl font-extrabold text-indigo-500 tracking-tight">${d.aMic.toFixed(1)}</h3><span class="text-[10px] font-bold text-slate-400">MG</span></div>`;

            chartKcalInst.updateSeries([{ name: 'Kcal', data: d.gK }]); 
            chartKcalInst.updateOptions({ xaxis: { categories: d.cats }, yaxis: { labels: {formatter: (v) => Math.round(v)} }, annotations: { yAxis: [{ y: 2146, borderColor: '#ef4444', strokeDashArray: 6, label: { borderColor: '#ef4444', style: { color: '#fff', background: '#ef4444', fontWeight: 700 }, text: 'Meta: 2146' } }] } });
            
            chartMacrosInst.updateSeries([{ name: 'Grasas', data: d.gF }, { name: 'Proteínas', data: d.gP }, { name: 'Carbs', data: d.gC }]); 
            chartMacrosInst.updateOptions({ xaxis: { categories: d.cats }, yaxis: { labels: {formatter: (v) => Math.round(v)} } });
            
            chartFastInst.updateSeries([{ name: 'Horas', data: d.gFast }]); 
            chartFastInst.updateOptions({ xaxis: { categories: d.cats }, yaxis: { min: 0, max: 28, labels: {formatter: (v) => Math.round(v) + "h"} } });
            
            chartMicroInst.updateSeries([{ name: 'mg', data: d.gMic }]); 
            chartMicroInst.updateOptions({ xaxis: { categories: d.cats }, yaxis: { labels: { formatter: (val) => val < 1 ? val.toFixed(4) : val.toFixed(1) } } });
        }

        // ==========================================
        // TIMELINE & ALIMENTOS REALES
        // ==========================================
        function getEmoji(n) { const l=n.toLowerCase(); if(l.includes('caf')) return '☕'; if(l.includes('huevo')||l.includes('yema')) return '🥚'; if(l.includes('queso')||l.includes('requeson')) return '🧀'; if(l.includes('pollo')||l.includes('pavo')) return '🍗'; if(l.includes('cerdo')||l.includes('jam')||l.includes('tocino')||l.includes('carrilleras')||l.includes('carne')||l.includes('higado')||l.includes('hígado')) return '🥩'; if(l.includes('pescado')||l.includes('sardina')||l.includes('bacalao')||l.includes('caballa')||l.includes('melva')||l.includes('salmon')||l.includes('rodaballo')) return '🐟'; if(l.includes('aguacate')) return '🥑'; if(l.includes('tomate')) return '🍅'; if(l.includes('fresa')||l.includes('arándano')||l.includes('platano')) return '🍓'; if(l.includes('manzana')||l.includes('naranja')) return '🍏'; if(l.includes('lechuga')||l.includes('brócoli')||l.includes('pepino')||l.includes('zanahoria')||l.includes('pimiento')) return '🥗'; if(l.includes('patata')) return '🥔'; if(l.includes('arroz')||l.includes('pan')||l.includes('bizcocho')) return '🍞'; if(l.includes('aceite')||l.includes('mantequilla')||l.includes('nata')) return '🧈'; if(l.includes('yogur')) return '🥣'; if(l.includes('nuez')||l.includes('semillas')||l.includes('avellana')) return '🌰'; if(l.includes('cacao')||l.includes('chocolate')||l.includes('nutella')) return '🍫'; return '🍽️'; }
        function getStyle(n) { const l=n.toLowerCase(); if(l.match(/queso|aceite|mantequilla|nata|aguacate|nuez|semillas|avellana/)) return 'bg-amber-50 text-amber-800 border-amber-200'; if(l.match(/pollo|cerdo|jam|huevo|yema|sardina|bacalao|caballa|melva|salmon|rodaballo|carrilleras|carne|higado/)) return 'bg-red-50 text-red-800 border-red-200'; if(l.match(/tomate|lechuga|pepino|zanahoria|manzana|fresa|arándano|platano|pimiento/)) return 'bg-emerald-50 text-emerald-800 border-emerald-200'; if(l.match(/café|agua|leche/)) return 'bg-slate-100 text-slate-700 border-slate-300'; return 'bg-gray-50 text-gray-600 border-gray-200'; }

        function renderRecentMeals() {
            const cont = document.getElementById('recent-meals');
            cont.innerHTML = "";
            let maxDays = Math.min(3, catsLabels.length);
            for(let i = catsLabels.length - 1; i >= catsLabels.length - maxDays; i--) {
                const dateStr = catsLabels[i];
                const isoD = isoDates[i];
                const isOmad = fasts[i] >= 23;
                const k = kcals[i], c = carbs[i], p = proTs[i], f = fats[i];
                const tKcal = (c*4)+(p*4)+(f*9); const cP=Math.round((c*4)/tKcal*100)||0, pP=Math.round((p*4)/tKcal*100)||0, fP=Math.round((f*9)/tKcal*100)||0;
                
                // Leemos las comidas reales del backend
                const mA = mealsData[isoD] || [{ time:"", type:"Comida", icon:"🍽️", items:["Sin registros"] }];
                let combinedItems = mA.flatMap(m => m.items).slice(0,5).join(', ') + "...";
                let title = isOmad ? "Desayuno (OMAD)" : mA.map(m=>m.type).join(" & ");
                let icon = isOmad ? "🔥" : getEmoji(combinedItems);
                let colorClass = isOmad ? "bg-orange-50 border-orange-100 text-orange-500" : "bg-emerald-50 border-emerald-100 text-emerald-500";

                cont.innerHTML += `
                <div class="bg-white rounded-3xl p-5 md:p-6 flex flex-col md:flex-row md:items-center justify-between shadow-sm border border-gray-200 hover:border-brand transition-colors">
                    <div class="flex items-center space-x-4 mb-4 md:mb-0">
                        <div class="w-14 h-14 md:w-16 md:h-16 shrink-0 rounded-2xl flex flex-col items-center justify-center border ${colorClass}"><span class="text-xl md:text-2xl">${icon}</span><span class="text-[9px] md:text-[10px] font-extrabold mt-1 uppercase">${dateStr}</span></div>
                        <div><h3 class="font-extrabold text-slate-900 text-lg">${title}</h3><p class="text-xs md:text-sm text-slate-500 mt-0.5">${combinedItems}</p></div>
                    </div>
                    <div class="flex justify-between items-center md:block md:text-right w-full md:w-auto">
                        <p class="text-xs text-slate-500 font-semibold order-2 md:order-none">P:${p}g (${pP}%) • C:${c}g (${cP}%) • F:${f}g (${fP}%)</p>
                        <p class="font-extrabold text-slate-900 text-xl md:text-2xl order-1 md:order-none">${k} <span class="text-[10px] md:text-xs text-slate-400 font-bold">KCAL</span></p>
                    </div>
                </div>`;
            }
        }

        function renderTimeline() {
            const container = document.getElementById('timeline-container');
            container.innerHTML = "";
            for (let i = catsLabels.length - 1; i >= 0; i--) { 
                const dateStr = catsLabels[i];
                const isoD = isoDates[i];
                const isOmad = fasts[i] >= 23; 
                const k=kcals[i], c=carbs[i], p=proTs[i], f=fats[i];
                const tKcal = (c*4)+(p*4)+(f*9); const cP=Math.round((c*4)/tKcal*100)||0, pP=Math.round((p*4)/tKcal*100)||0, fP=Math.round((f*9)/tKcal*100)||0;
                
                const mA = mealsData[isoD] || [{ time:"-", type:"General", icon:"🍽️", items:["Varios alimentos"] }];
                let b = isOmad?'border-orange-400':'border-gray-200', bg = isOmad?'bg-gradient-to-r from-orange-500 to-red-500 text-white':'bg-gray-100 text-slate-800';
                
                let h = `<div class="relative flex items-center justify-between md:justify-normal md:odd:flex-row-reverse group"><div class="flex items-center justify-center w-10 h-10 rounded-full border-4 border-[#f1f3f5] ${isOmad?'bg-orange-500 text-white':'bg-gray-300 text-gray-600'} shrink-0 md:order-1 md:group-odd:-translate-x-1/2 md:group-even:translate-x-1/2 z-10 shadow-sm">${isOmad?'🔥':'•'}</div><div class="w-[calc(100%-3rem)] md:w-[calc(50%-2.5rem)] p-5 md:p-6 rounded-3xl border ${b} bg-white hover:shadow-md transition-all"><div class="inline-flex items-center px-4 py-1.5 rounded-lg ${bg}"><span class="font-extrabold text-sm uppercase tracking-wide">${dateStr}</span>${isOmad ? '<span class="ml-3 text-[10px] font-extrabold bg-white text-orange-600 px-2 py-0.5 rounded uppercase tracking-widest shadow-sm">OMAD 🔥</span>' : ''}</div><div class="flex flex-wrap gap-2 mt-4 mb-5"><span class="text-xs font-bold bg-gray-100 px-2 py-1 rounded shadow-sm border border-gray-200">⚡ ${k} KCAL</span><span class="text-xs font-bold text-amber-800 bg-amber-50 px-2 py-1 rounded shadow-sm border border-amber-200">Grasas: ${f}g (${fP}%)</span><span class="text-xs font-bold text-blue-800 bg-blue-50 px-2 py-1 rounded shadow-sm border border-blue-200">Prot: ${p}g (${pP}%)</span><span class="text-xs font-bold text-red-800 bg-red-50 px-2 py-1 rounded shadow-sm border border-red-200">Carb: ${c}g (${cP}%)</span></div><div class="space-y-4 border-t border-gray-100 pt-4">`;
                mA.forEach(m => {
                    let itemsHtml = m.items.map(it=>`<span class="inline-flex items-center px-2 py-1 rounded text-[11px] font-bold border ${getStyle(it)} mb-2 mr-2 shadow-sm">${getEmoji(it)} ${it}</span>`).join('');
                    h += `<div><p class="text-sm font-extrabold text-slate-800 mb-2">${m.icon} ${m.time} - <span class="text-slate-400 font-semibold tracking-wider uppercase text-[10px]">${m.type}</span></p><div class="pl-6">${itemsHtml}</div></div>`;
                });
                container.innerHTML += h + `</div></div></div>`;
            }
        }
    </script>
</body>
</html>
